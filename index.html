<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhandaType</title>
     <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Test your typing speed with KhandaType. Features include custom themes, code mode, and detailed speed graphs.">
    <meta name="keywords" content="typing test, wpm, keyboard, speed test">
</head>
<body>
    <main>
        <h1>KhandaType</h1>

        <div id="live-stats">
            <span id="live-wpm">wpm: 0</span>
            <span id="live-acc">acc: 100%</span>
        </div>

        <div id="header">
            <div id="info">30</div>
            <div id="nav-buttons">
                <button id="settingsBtn" type="button">⚙ settings</button>
                <button id="newGameBtn" type="button">New game</button>
            </div>
        </div>

        <div id="game" tabindex="0">
    <div id="words"></div>
    <div id="cursor"></div>
    <div id="focus-error">Click here to focus</div>
</div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>Test Settings</h2>
                
                <div class="setting-group">
                    <label>Theme</label>
                    <select id="setTheme">
                        <option value="default">Carbon (Yellow)</option>
                        <option value="cyberpunk">Cyberpunk (Neon)</option>
                        <option value="lavender">Lavender (Purple)</option>
                        <option value="monokai">Monokai</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Content Type</label>
                    <select id="setType">
                        <option value="words">Standard Words</option>
                        <option value="code">Code (JS/Python)</option>
                        <option value="numbers">Numbers & Punctuation</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Time (seconds)</label>
                    <input type="number" id="setTime" value="30">
                </div>

                <div class="setting-group">
                    <label>Sound Volume</label>
                    <input type="range" id="setVol" min="0" max="1" step="0.1" value="0.5">
                </div>

                <div class="checkboxes">
                    <label><input type="checkbox" id="setSuddenDeath"> Sudden Death (1 error = Game Over)</label>
                    <label><input type="checkbox" id="setMaster"> Master Mode (Blur on error)</label>
                    <label><input type="checkbox" id="setNoBackspace"> No Backspace</label>
                </div>

                <button id="saveSettings" class="primary-btn">Save & Restart</button>
            </div>
        </div>
    </main>
    <input type="text" id="mobileInput" 
       autocomplete="off" autocorrect="off" autocapitalize="off" 
       spellcheck="false" 
       style="opacity: 0; position: absolute; pointer-events: none; width: 0; height: 0;">
    <script src="typing.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
